
# ===============================
# Application Identity
# ===============================
spring.application.name=01_Spring_Boot_Hibernate_Rest_Exception_Profile

# ===============================
# Datasource Configuration
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/kodewala_practise_db
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Settings
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# ===============================
# Profiles
# ===============================
# Example: activate 'dev' profile by default.profiles.active=dev

# ===============================
# Actuator Configuration
# ===============================
# Expose all endpoints
management.endpoints.web.exposure.include=*

# Change actuator base path if needed
management.endpoints.web.base-path=/actuator

# Health details always visible
management.endpoint.health.show-details=always

# Enable metrics
management.metrics.enable.all=true

# Enable shutdown endpoint (optional, careful in prod)
management.endpoint.shutdown.enabled=true

# ===============================
# Logging
# ===============================
#logging.level.org.springframework=INFO
#logging.level.com.yourpackage=DEBUG
